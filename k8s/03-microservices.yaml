########################################
# Eureka Server
########################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: kyc-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: kyc/eureka-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
  namespace: kyc-platform
spec:
  selector:
    app: eureka-server
  ports:
    - port: 8761
      targetPort: 8761
---
########################################
# API Gateway
########################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: kyc-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: kyc/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: kyc-common-config
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: kyc-common-config
                  key: EUREKA_URL
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: kyc-platform
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
---
########################################
# Auth Service
########################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: kyc-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: kyc/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: kyc-common-config
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/kyc_auth_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kyc-secrets
                  key: DB_PASSWORD
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: kyc-common-config
                  key: EUREKA_URL
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: kyc-platform
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
---
