services:

  mysql:
    image: mysql:8.0
    container_name: kyc-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: kyc_auth_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kyc-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: kyc-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - kyc-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kyc-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    networks:
      - kyc-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kyc-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "8090:8080"
    networks:
      - kyc-network

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: kyc-eureka
    ports:
      - "8761:8761"
    networks:
      - kyc-network

  api-gateway:
    build:
      context: ./api-gateway
    container_name: kyc-gateway
    depends_on:
      - eureka-server
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://kyc-eureka:8761/eureka/
    ports:
      - "8080:8080"
    networks:
      - kyc-network

  auth-service:
    build:
      context: ./auth-service
    container_name: kyc-auth
    depends_on:
      - mysql
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/kyc_auth_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      DB_PASSWORD: rootpassword
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://kyc-eureka:8761/eureka/
    ports:
      - "8081:8081"
    networks:
      - kyc-network

  user-service:
    build:
      context: ./user-service
    container_name: kyc-user
    depends_on:
      - mysql
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/kyc_auth_db
      SPRING_DATASOURCE_USERNAME: root
      DB_PASSWORD: rootpassword
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://kyc-eureka:8761/eureka/
    ports:
      - "8082:8082"
    networks:
      - kyc-network

  kyc-service:
    build:
      context: ./kyc-service
    container_name: kyc-kyc
    depends_on:
      - mysql
      - kafka
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/kyc_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      DB_PASSWORD: rootpassword
      KAFKA_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://kyc-eureka:8761/eureka/
    ports:
      - "8083:8083"
    networks:
      - kyc-network

  admin-service:
    build:
      context: ./admin-service
    container_name: kyc-admin
    depends_on:
      - mysql
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/kyc_auth_db
      SPRING_DATASOURCE_USERNAME: root
      DB_PASSWORD: rootpassword
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://kyc-eureka:8761/eureka/
    ports:
      - "8084:8084"
    networks:
      - kyc-network

  notification-service:
    build:
      context: ./notification-service
    container_name: kyc-notification
    depends_on:
      - kafka
      - eureka-server
    environment:
      KAFKA_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://kyc-eureka:8761/eureka/
      EMAIL_ENABLED: "false"
    ports:
      - "8085:8085"
    networks:
      - kyc-network

volumes:
  mysql_data:

networks:
  kyc-network:
    driver: bridge