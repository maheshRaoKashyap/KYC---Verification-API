########################################
# Notification Service
########################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: kyc-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: kyc/notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
          env:
            - name: KAFKA_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: kyc-common-config
                  key: KAFKA_SERVERS
            - name: EMAIL_ENABLED
              value: "false"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: kyc-common-config
                  key: EUREKA_URL
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: kyc-platform
spec:
  selector:
    app: notification-service
  ports:
    - port: 8085
      targetPort: 8085
