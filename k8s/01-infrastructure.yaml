---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: kyc-platform
  labels:
    app: kyc-platform

---
# ConfigMap - shared config
apiVersion: v1
kind: ConfigMap
metadata:
  name: kyc-config
  namespace: kyc-platform
data:
  EUREKA_URL: "http://eureka-server:8761/eureka/"
  KAFKA_SERVERS: "kafka:9092"
  DB_HOST: "mysql"
  DB_PORT: "3306"
  JWT_SECRET: "bXlTdXBlclNlY3JldEtleUZvcktZQ1BsYXRmb3JtMjAyNFZlcnkxMjM0NTY3ODk="
  EMAIL_ENABLED: "false"

---
# Secret
apiVersion: v1
kind: Secret
metadata:
  name: kyc-secrets
  namespace: kyc-platform
type: Opaque
stringData:
  DB_PASSWORD: "rootpassword"
  MYSQL_ROOT_PASSWORD: "rootpassword"

---
# MySQL PersistentVolumeClaim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: kyc-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
# MySQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: kyc-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kyc-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: kyc_auth_db
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: kyc-platform
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306

---
# Zookeeper
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: kyc-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.5.0
          ports:
            - containerPort: 2181
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"

---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: kyc-platform
spec:
  selector:
    app: zookeeper
  ports:
    - port: 2181

---
# Kafka
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: kyc-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.5.0
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper:2181"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"

---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: kyc-platform
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
